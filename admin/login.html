<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Rawand Artist</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🎮</div>
      <h1>Admin Login</h1>
      <p class="subtitle">Rawand Artist Store Management</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" required placeholder="••••••••">
        </div>
        <div class="form-error" id="loginError" style="display:none"></div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-muted)">
        <a href="../index.html">← Back to Store</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../firebase/config.js"></script>
  <script src="../assets/js/admin/auth.js"></script>
  <script>
    initFirebase();
    AdminAuth.init();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("loginError");
      errorEl.style.display = "none";
      const btn = e.target.querySelector("button");
      btn.disabled = true;
      btn.textContent = "Signing in...";
      try {
        await AdminAuth.login(
          document.getElementById("email").value,
          document.getElementById("password").value
        );
      } catch (err) {
        const messages = {
          "auth/invalid-credential": "Wrong email or password. Check Firebase → Authentication → Users.",
          "auth/user-not-found": "No account with this email. Add the user in Firebase Console first.",
          "auth/wrong-password": "Incorrect password.",
          "auth/invalid-email": "Invalid email address.",
          "auth/too-many-requests": "Too many attempts. Wait a few minutes and try again.",
          "auth/operation-not-allowed": "Email/Password sign-in is not enabled. Enable it in Firebase → Authentication → Sign-in method.",
          "auth/unauthorized-domain": "This website is not authorized. Add rawand1212.github.io in Firebase → Authentication → Settings → Authorized domains."
        };
        errorEl.textContent = messages[err.code] || err.message;
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>

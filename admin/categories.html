<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — Rawand Artist Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css?v=4">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-header">
        <h1>Categories</h1>
        <button type="button" class="btn btn-primary" id="addCategoryBtn">+ Add Category</button>
      </div>
      <div id="categoryStatus" style="display:none;margin-bottom:1rem;padding:0.75rem 1rem;border-radius:var(--radius-sm);font-size:0.9rem"></div>
      <div id="importBanner" style="display:none;margin-bottom:1rem;padding:1rem 1.25rem;border-radius:var(--radius-sm);background:rgba(124,58,237,0.1);border:1px solid var(--accent)">
        <p style="margin-bottom:0.75rem;color:var(--text-muted);font-size:0.9rem">
          Your database is empty. The categories on the store were built-in samples — click below to copy them into Firebase.
        </p>
        <button type="button" class="btn btn-primary" id="importSampleBtn">Import Sample Categories & Products</button>
      </div>
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr><th>Icon</th><th>Name</th><th>Slug</th><th>Actions</th></tr>
          </thead>
          <tbody id="categoriesTable">
            <tr><td colspan="4" style="text-align:center;padding:2rem">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/config.js?v=4"></script>
  <script src="../assets/js/demo-data.js?v=4"></script>
  <script src="../firebase/config.js?v=4"></script>
  <script src="../assets/js/firestore-rest.js?v=4"></script>
  <script src="../assets/js/firebase-service.js?v=4"></script>
  <script src="../assets/js/admin/auth.js?v=4"></script>
  <script src="../assets/js/admin/admin-ui.js?v=4"></script>
  <script>
    let categories = [];

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function showCategoryStatus(message, isError = false) {
      const el = document.getElementById("categoryStatus");
      el.style.display = "block";
      el.style.background = isError ? "rgba(239,68,68,0.1)" : "rgba(124,58,237,0.1)";
      el.style.border = `1px solid ${isError ? "var(--danger)" : "var(--accent)"}`;
      el.style.color = isError ? "var(--danger)" : "var(--text-muted)";
      el.textContent = message;
    }

    async function loadCategories() {
      const tbody = document.getElementById("categoriesTable");
      try {
        document.getElementById("categoryStatus").style.display = "none";
        categories = await FirebaseService.getCategories();

        if (!categories.length) {
          document.getElementById("importBanner").style.display = "block";
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted)">No categories yet. Click "+ Add Category" or import sample data above.</td></tr>`;
          return;
        }

        document.getElementById("importBanner").style.display = "none";
        tbody.innerHTML = categories.map((c) => `
          <tr>
            <td style="font-size:1.5rem">${c.icon || "📁"}</td>
            <td>${escapeHtml(c.name)}</td>
            <td>${escapeHtml(c.slug || slugify(c.name))}</td>
            <td class="actions">
              <button type="button" class="btn btn-secondary btn-sm" onclick="editCategory('${c.id}')">Edit</button>
              <button type="button" class="btn btn-danger btn-sm" onclick="deleteCategory('${c.id}')">Delete</button>
            </td>
          </tr>`).join("");
      } catch (err) {
        showCategoryStatus(AdminUI.formatError(err), true);
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--danger)">${AdminUI.formatError(err)}</td></tr>`;
      }
    }

    function categoryFormHtml(cat = {}) {
      return `
        <div class="form-group"><label>Name</label><input class="form-input" id="cName" value="${escapeHtml(cat.name)}" required></div>
        <div class="form-group"><label>Icon (emoji)</label><input class="form-input" id="cIcon" value="${escapeHtml(cat.icon || "📁")}" maxlength="4"></div>
        <div class="form-group"><label>Slug</label><input class="form-input" id="cSlug" value="${escapeHtml(cat.slug)}" placeholder="auto-generated from name"></div>`;
    }

    function openCategoryModal(cat = null) {
      const isEdit = !!cat;
      AdminUI.openModal(isEdit ? "Edit Category" : "Add Category", categoryFormHtml(cat), async (overlay) => {
        const name = overlay.querySelector("#cName").value.trim();
        if (!name) throw new Error("Category name is required");

        const data = {
          name,
          icon: overlay.querySelector("#cIcon").value.trim() || "📁",
          slug: overlay.querySelector("#cSlug").value.trim() || slugify(name)
        };

        if (isEdit) {
          await FirebaseService.updateCategory(cat.id, data);
          AdminUI.showToast("Category updated!");
        } else {
          await FirebaseService.addCategory(data);
          AdminUI.showToast("Category created!");
        }
        loadCategories();
      });
    }
    window.openCategoryModal = openCategoryModal;

    window.editCategory = (id) => {
      const cat = categories.find((c) => c.id === id);
      if (!cat) {
        AdminUI.showToast("Category not found. Refresh the page.", true);
        return;
      }
      openCategoryModal(cat);
    };

    window.deleteCategory = async (id) => {
      if (!confirm("Delete this category?")) return;
      try {
        await FirebaseService.deleteCategory(id);
        AdminUI.showToast("Category deleted");
        loadCategories();
      } catch (err) {
        AdminUI.showToast(AdminUI.formatError(err), true);
      }
    };

    async function importSampleData() {
      const btn = document.getElementById("importSampleBtn");
      btn.disabled = true;
      btn.textContent = "Importing...";
      try {
        const result = await FirebaseService.seedSampleData();
        AdminUI.showToast(`Imported ${result.categories} categories and ${result.products} products!`);
        await loadCategories();
      } catch (err) {
        showCategoryStatus(AdminUI.formatError(err), true);
        AdminUI.showToast(AdminUI.formatError(err), true);
        btn.disabled = false;
        btn.textContent = "Import Sample Categories & Products";
      }
    }

    async function boot() {
      try {
        initFirebase();
        if (typeof firebase === "undefined" || !AdminAuth.init()) {
          showCategoryStatus("Firebase failed to load. Disable ad blockers and refresh.", true);
          return;
        }

        AdminUI.injectLayout("categories");

        document.getElementById("addCategoryBtn").addEventListener("click", openCategoryModal);
        document.getElementById("importSampleBtn").addEventListener("click", importSampleData);

        const user = await AdminAuth.requireUser();
        if (!user) return;

        showCategoryStatus(`Logged in as ${user.email}`, false);
        await loadCategories();
      } catch (err) {
        showCategoryStatus(err.message || "Something went wrong. Refresh the page.", true);
        document.getElementById("categoriesTable").innerHTML =
          `<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--danger)">${err.message || "Error loading page"}</td></tr>`;
      }
    }

    boot();
  </script>
</body>
</html>

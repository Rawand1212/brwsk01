<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Rawand Artist Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css?v=11">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-header">
        <h1>Products</h1>
        <button type="button" class="btn btn-primary" id="addProductBtn">+ Add Product</button>
      </div>
      <div id="productStatus" style="display:none;margin-bottom:1rem;padding:0.75rem 1rem;border-radius:var(--radius-sm);font-size:0.9rem"></div>
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Flags</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr><td colspan="7" style="text-align:center;padding:2rem">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="../assets/js/config.js?v=11"></script>
  <script src="../assets/js/demo-data.js?v=11"></script>
  <script src="../firebase/config.js?v=11"></script>
  <script src="../assets/js/image-utils.js?v=11"></script>
  <script src="../assets/js/firebase-service.js?v=11"></script>
  <script src="../assets/js/admin/auth.js?v=11"></script>
  <script src="../assets/js/admin/admin-ui.js?v=11"></script>
  <script>
    let categories = [];
    let products = [];

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function showStatus(message, isError = false) {
      const el = document.getElementById("productStatus");
      el.style.display = "block";
      el.style.background = isError ? "rgba(239,68,68,0.1)" : "rgba(124,58,237,0.1)";
      el.style.border = `1px solid ${isError ? "var(--danger)" : "var(--accent)"}`;
      el.style.color = isError ? "var(--danger)" : "var(--text-muted)";
      el.textContent = message;
    }

    async function loadProducts() {
      const tbody = document.getElementById("productsTable");
      try {
        const [productResult, categoryResult] = await Promise.allSettled([
          FirebaseService.getProducts(),
          FirebaseService.getCategories()
        ]);

        if (categoryResult.status === "fulfilled") {
          categories = categoryResult.value;
        } else {
          categories = [];
          showStatus("Could not load categories: " + AdminUI.formatError(categoryResult.reason), true);
        }

        if (productResult.status === "fulfilled") {
          products = productResult.value;
        } else {
          products = [];
          showStatus("Could not load products: " + AdminUI.formatError(productResult.reason), true);
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger)">${AdminUI.formatError(productResult.reason)}</td></tr>`;
          return;
        }

        if (!products.length) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted)">No products yet. ${categories.length ? 'Click "+ Add Product" to create one.' : 'Add a category first (Categories page), then add products.'}</td></tr>`;
          return;
        }

        tbody.innerHTML = products.map((p) => `
          <tr>
            <td><img class="product-thumb" src="${escapeHtml(p.images?.[0] || "../assets/images/placeholder.svg")}" alt=""></td>
            <td>${escapeHtml(p.name)}</td>
            <td>${escapeHtml(p.categoryName || "—")}</td>
            <td>${Number(p.price || 0).toLocaleString("en-US")} د.ع</td>
            <td>${p.stock ?? 0}</td>
            <td>${p.featured ? "⭐" : ""} ${p.isNew ? "🆕" : ""}</td>
            <td class="actions">
              <button type="button" class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')">Edit</button>
              <button type="button" class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
            </td>
          </tr>`).join("");
      } catch (err) {
        showStatus(AdminUI.formatError(err), true);
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger)">${AdminUI.formatError(err)}</td></tr>`;
      }
    }

    function productFormHtml(product) {
      const p = product || {};
      const catOptions = categories.map((c) =>
        `<option value="${c.id}" data-name="${escapeHtml(c.name)}" ${p.categoryId === c.id ? "selected" : ""}>${escapeHtml(c.name)}</option>`
      ).join("");

      return `
        <div class="form-group"><label>Name *</label><input class="form-input" id="pName" value="${escapeHtml(p.name)}" required></div>
        <div class="form-group"><label>Description</label><textarea class="form-textarea" id="pDesc">${escapeHtml(p.description)}</textarea></div>
        <div class="form-group"><label>Price (IQD) *</label><input type="number" step="1" min="0" class="form-input" id="pPrice" value="${p.price ?? ""}" required></div>
        <div class="form-group"><label>Category *</label><select class="form-select" id="pCategory" required><option value="">Select category</option>${catOptions}</select></div>
        <div class="form-group"><label>Stock</label><input type="number" class="form-input" id="pStock" value="${p.stock ?? 0}" min="0"></div>
        <div class="toggle-group">
          <label class="toggle-label"><input type="checkbox" id="pFeatured" ${p.featured ? "checked" : ""}> Featured</label>
          <label class="toggle-label"><input type="checkbox" id="pNew" ${p.isNew ? "checked" : ""}> New Arrival</label>
        </div>
        <div class="form-group" style="margin-top:1rem"><label>Images (optional)</label><div id="imageUploadArea"></div></div>`;
    }

    function readProductForm(overlay) {
      const catSelect = overlay.querySelector("#pCategory");
      const name = overlay.querySelector("#pName").value.trim();
      const price = parseFloat(overlay.querySelector("#pPrice").value);

      if (!name) throw new Error("Product name is required");
      if (!catSelect.value) throw new Error("Please select a category");
      if (Number.isNaN(price) || price < 0) throw new Error("Please enter a valid price");

      return {
        name,
        description: overlay.querySelector("#pDesc").value.trim(),
        price,
        categoryId: catSelect.value,
        categoryName: catSelect.selectedOptions[0]?.dataset.name || "",
        stock: parseInt(overlay.querySelector("#pStock").value, 10) || 0,
        featured: overlay.querySelector("#pFeatured").checked,
        isNew: overlay.querySelector("#pNew").checked
      };
    }

    async function openProductModal(product = null) {
      try {
        categories = await FirebaseService.getCategories();
      } catch (err) {
        AdminUI.showToast("Could not load categories: " + AdminUI.formatError(err), true);
        return;
      }

      if (!categories.length) {
        AdminUI.showToast("Add a category first (Categories page), then add products.", true);
        return;
      }

      const isEdit = !!product;
      const overlay = AdminUI.openModal(
        isEdit ? "Edit Product" : "Add Product",
        productFormHtml(isEdit ? product : {}),
        async (modal) => {
          const data = readProductForm(modal);
          const grid = modal.querySelector("#previewGrid");
          data.images = ImageUpload.getExistingUrls(grid);

          if (isEdit) {
            await FirebaseService.updateProduct(product.id, data);
            AdminUI.showToast("Product updated on store!");
          } else {
            await FirebaseService.addProduct(data);
            AdminUI.showToast("Product added to store!");
          }
          loadProducts();
        }
      );

      ImageUpload.renderZone(overlay.querySelector("#imageUploadArea"), product?.images || []);
    }

    window.editProduct = (id) => {
      const product = products.find((p) => p.id === id);
      if (product) openProductModal(product);
    };

    window.deleteProduct = async (id) => {
      if (!confirm("Delete this product?")) return;
      try {
        await FirebaseService.deleteProduct(id);
        AdminUI.showToast("Product deleted");
        loadProducts();
      } catch (err) {
        AdminUI.showToast(AdminUI.formatError(err), true);
      }
    };

    async function boot() {
      try {
        initFirebase();
        if (typeof firebase === "undefined" || !AdminAuth.init()) {
          showStatus("Firebase failed to load. Disable ad blockers and refresh.", true);
          return;
        }

        AdminUI.injectLayout("products");
        const addBtn = document.getElementById("addProductBtn");
        addBtn.disabled = true;
        addBtn.addEventListener("click", () => openProductModal());

        const user = await AdminAuth.requireUser();
        if (!user) return;

        await loadProducts();
        addBtn.disabled = false;
        showStatus(`Logged in as ${user.email}. ${categories.length} categor${categories.length === 1 ? "y" : "ies"}, ${products.length} product${products.length === 1 ? "" : "s"}. Click "+ Add Product" to create one.`);
      } catch (err) {
        showStatus(err.message || "Something went wrong. Refresh the page.", true);
      }
    }

    boot();
  </script>
</body>
</html>

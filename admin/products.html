<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Rawand Artist Admin</title>
  <link rel="stylesheet" href="../assets/css/admin.css?v=5">
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="admin-header">
        <h1>Products</h1>
        <button type="button" class="btn btn-primary" id="addProductBtn">+ Add Product</button>
      </div>
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Flags</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr><td colspan="7" style="text-align:center;padding:2rem">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="../assets/js/config.js?v=5"></script>
  <script src="../assets/js/demo-data.js?v=5"></script>
  <script src="../firebase/config.js?v=5"></script>
  <script src="../assets/js/image-utils.js?v=5"></script>  <script src="../assets/js/firebase-service.js?v=5"></script>
  <script src="../assets/js/admin/auth.js?v=5"></script>
  <script src="../assets/js/admin/admin-ui.js?v=5"></script>
  <script>
    initFirebase();
    AdminAuth.init();
    AdminUI.injectLayout("products");

    let categories = [];
    let products = [];

    async function loadProducts() {
      const tbody = document.getElementById("productsTable");
      try {
        [products, categories] = await Promise.all([
          FirebaseService.getProducts(),
          FirebaseService.getCategories()
        ]);

        if (!products.length) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted)">No products yet. ${categories.length ? 'Click "+ Add Product" to create one.' : 'Add a category first, then add products.'}</td></tr>`;
          return;
        }

        tbody.innerHTML = products.map((p) => `
          <tr>
            <td><img class="product-thumb" src="${p.images?.[0] || ""}" alt=""></td>
            <td>${p.name}</td>
            <td>${p.categoryName || "—"}</td>
            <td>$${Number(p.price).toFixed(2)}</td>
            <td>${p.stock ?? 0}</td>
            <td>${p.featured ? "⭐" : ""} ${p.isNew ? "🆕" : ""}</td>
            <td class="actions">
              <button class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
            </td>
          </tr>`).join("");
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--danger)">${AdminUI.formatError(err)}</td></tr>`;
      }
    }

    function productFormHtml(product = {}) {
      const catOptions = categories.map((c) =>
        `<option value="${c.id}" data-name="${c.name}" ${product.categoryId === c.id ? "selected" : ""}>${c.name}</option>`
      ).join("");

      return `
        <div class="form-group"><label>Name</label><input class="form-input" id="pName" value="${product.name || ""}" required></div>
        <div class="form-group"><label>Description</label><textarea class="form-textarea" id="pDesc">${product.description || ""}</textarea></div>
        <div class="form-group"><label>Price ($)</label><input type="number" step="0.01" class="form-input" id="pPrice" value="${product.price || ""}" required></div>
        <div class="form-group"><label>Category</label><select class="form-select" id="pCategory" required><option value="">Select category</option>${catOptions}</select></div>
        <div class="form-group"><label>Stock</label><input type="number" class="form-input" id="pStock" value="${product.stock ?? 0}" min="0"></div>
        <div class="toggle-group">
          <label class="toggle-label"><input type="checkbox" id="pFeatured" ${product.featured ? "checked" : ""}> Featured</label>
          <label class="toggle-label"><input type="checkbox" id="pNew" ${product.isNew ? "checked" : ""}> New Arrival</label>
        </div>
        <div class="form-group" style="margin-top:1rem"><label>Images</label><div id="imageUploadArea"></div></div>`;
    }

    function openProductModal(product = null) {
      if (!categories.length) {
        AdminUI.showToast("Add a category first (Categories page), then add products.", true);
        return;
      }
      const isEdit = !!product;
      const modal = AdminUI.openModal(isEdit ? "Edit Product" : "Add Product", productFormHtml(product), async () => {
        if (STORE_CONFIG.demoMode) {
          AdminUI.showToast("Disable demo mode and configure Firebase to save products", true);
          throw new Error("Demo mode");
        }

        const catSelect = modal.querySelector("#pCategory");
        const data = {
          name: modal.querySelector("#pName").value.trim(),
          description: modal.querySelector("#pDesc").value.trim(),
          price: parseFloat(modal.querySelector("#pPrice").value),
          categoryId: catSelect.value,
          categoryName: catSelect.selectedOptions[0]?.dataset.name || "",
          stock: parseInt(modal.querySelector("#pStock").value) || 0,
          featured: modal.querySelector("#pFeatured").checked,
          isNew: modal.querySelector("#pNew").checked
        };

        const grid = modal.querySelector("#previewGrid");
        const existingUrls = ImageUpload.getExistingUrls(grid);

        if (isEdit) {
          let newUrls = [];
          if (ImageUpload.pendingFiles.length) {
            newUrls = await ImageUpload.uploadAll(product.id);
          }
          data.images = [...existingUrls, ...newUrls];
          await FirebaseService.updateProduct(product.id, data);
          AdminUI.showToast("Product updated!");
        } else {
          data.images = existingUrls;
          const id = await FirebaseService.addProduct(data);
          if (ImageUpload.pendingFiles.length) {
            const urls = await ImageUpload.uploadAll(id);
            await FirebaseService.updateProduct(id, { images: [...data.images, ...urls] });
          }
          AdminUI.showToast("Product created!");
        }
        loadProducts();
      });

      ImageUpload.renderZone(modal.querySelector("#imageUploadArea"), product?.images || []);
    }

    window.editProduct = (id) => {
      const product = products.find((p) => p.id === id);
      if (product) openProductModal(product);
    };

    window.deleteProduct = async (id) => {
      if (!confirm("Delete this product?")) return;
      try {
        await FirebaseService.deleteProduct(id);
        AdminUI.showToast("Product deleted");
        loadProducts();
      } catch (err) {
        AdminUI.showToast(AdminUI.formatError(err), true);
      }
    };

    document.getElementById("addProductBtn").addEventListener("click", () => openProductModal());

    (async function () {
      const user = await AdminAuth.requireUser();
      if (user) loadProducts();
    })();
  </script>
</body>
</html>

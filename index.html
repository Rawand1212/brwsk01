<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="brwsk01 — Games & Digital Store">
  <title>brwsk01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=11">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero hero-simple">
      <div class="container hero-content">
        <h1 id="heroTitle">brwsk01</h1>
        <p id="heroSubtitle"></p>
        <div class="hero-actions">
          <a href="products.html" class="btn btn-primary" id="browseBtn"></a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2 id="productsTitle"></h2>
        </div>
        <div class="category-pills" id="categoryPills"></div>
        <div class="product-grid" id="productGrid"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=11"></script>
  <script src="assets/js/i18n.js?v=11"></script>
  <script src="assets/js/demo-data.js?v=11"></script>
  <script src="firebase/config.js?v=11"></script>
  <script src="assets/js/image-utils.js?v=11"></script>
  <script src="assets/js/ui.js?v=11"></script>
  <script src="assets/js/firebase-service.js?v=11"></script>
  <script src="assets/js/products.js?v=11"></script>
  <script src="assets/js/components.js?v=11"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("home");

      document.getElementById("heroTitle").textContent = I18N.t("heroTitle");
      document.getElementById("heroSubtitle").textContent = I18N.t("heroSubtitle");
      document.getElementById("browseBtn").textContent = I18N.t("browse");
      document.getElementById("productsTitle").textContent = I18N.t("allProducts");

      const categories = await FirebaseService.getCategories();
      Products.renderCategoryPills(categories, document.getElementById("categoryPills"));

      UI.showLoader(document.getElementById("productGrid"));
      const products = await FirebaseService.getProducts();
      Products.renderGrid(products, document.getElementById("productGrid"));
    });
  </script>
</body>
</html>

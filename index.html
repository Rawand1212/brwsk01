<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BRWSK01 — Games & Digital Store">
  <title>BRWSK01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=21">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80' font-family='serif'>B</text></svg>">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero hero-simple">
      <div class="container hero-content">
        <h1 id="heroTitle">BRWSK01</h1>
        <p id="heroSubtitle"></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2 id="categoriesTitle"></h2>
          <p id="categoriesSub"></p>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=21"></script>
  <script src="assets/js/i18n.js?v=21"></script>
  <script src="assets/js/demo-data.js?v=21"></script>
  <script src="firebase/config.js?v=21"></script>
  <script src="assets/js/image-utils.js?v=21"></script>
  <script src="assets/js/ui.js?v=21"></script>
  <script src="assets/js/firebase-service.js?v=21"></script>
  <script src="assets/js/products.js?v=21"></script>
  <script src="assets/js/components.js?v=21"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("home");

      document.getElementById("heroTitle").textContent = I18N.t("heroTitle");
      document.getElementById("heroSubtitle").textContent = I18N.t("heroSubtitle");
      document.getElementById("categoriesTitle").textContent = I18N.t("categories");
      document.getElementById("categoriesSub").textContent = I18N.t("chooseCategory");

      UI.showLoader(document.getElementById("categoryGrid"));
      const categories = await FirebaseService.getCategories();
      Products.renderCategoryGrid(categories, document.getElementById("categoryGrid"));
    });
  </script>
</body>
</html>

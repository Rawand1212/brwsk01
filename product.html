<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — brwsk01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=12">
</head>
<body>
  <div id="site-header"></div>

  <main class="container" id="productMain">
    <div class="loader"><div class="loader-spinner"></div><p></p></div>
  </main>

  <section class="section" id="relatedSection" style="display:none">
    <div class="container">
      <div class="section-header">
        <h2 id="relatedTitle"></h2>
      </div>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=12"></script>
  <script src="assets/js/i18n.js?v=12"></script>
  <script src="assets/js/demo-data.js?v=12"></script>
  <script src="firebase/config.js?v=12"></script>
  <script src="assets/js/image-utils.js?v=12"></script>
  <script src="assets/js/ui.js?v=12"></script>
  <script src="assets/js/firebase-service.js?v=12"></script>
  <script src="assets/js/products.js?v=12"></script>
  <script src="assets/js/components.js?v=12"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("products");
      document.querySelector("#productMain .loader p").textContent = I18N.t("loading");
      document.getElementById("relatedTitle").textContent = I18N.t("related");

      const id = new URLSearchParams(window.location.search).get("id");
      if (!id) {
        document.getElementById("productMain").innerHTML = `<div class="empty-state"><p>${I18N.t("productNotFound")}</p><a href="products.html" class="btn btn-primary" style="margin-top:1rem">${I18N.t("browse")}</a></div>`;
        return;
      }

      const product = await FirebaseService.getProduct(id);
      if (!product) {
        document.getElementById("productMain").innerHTML = `<div class="empty-state"><p>${I18N.t("productNotFound")}</p><a href="products.html" class="btn btn-primary" style="margin-top:1rem">${I18N.t("browse")}</a></div>`;
        return;
      }

      document.title = `${product.name} — brwsk01`;

      const images = product.images?.length ? product.images : ["assets/images/placeholder.svg"];
      const stockClass = product.stock <= 0 ? "stock-out" : product.stock <= 3 ? "stock-low" : "stock-in";
      const stockText = product.stock <= 0
        ? I18N.t("outOfStock")
        : product.stock <= 3
          ? I18N.t("lowStock", { n: product.stock })
          : I18N.t("inStock");

      const badges = [];
      if (product.featured) badges.push(`<span class="badge badge-featured">${I18N.t("badgeFeatured")}</span>`);
      if (product.isNew) badges.push(`<span class="badge badge-new">${I18N.t("badgeNew")}</span>`);

      document.getElementById("productMain").innerHTML = `
        <div class="product-detail">
          <div class="image-slider" id="imageSlider">
            <div class="slider-main">
              ${images.map((img, i) => `<div class="slider-slide ${i === 0 ? "active" : ""}"><img src="${img}" alt="${product.name}"></div>`).join("")}
              ${images.length > 1 ? '<button class="slider-nav slider-prev">‹</button><button class="slider-nav slider-next">›</button>' : ""}
            </div>
            ${images.length > 1 ? `<div class="slider-thumbs">${images.map((img, i) => `<div class="slider-thumb ${i === 0 ? "active" : ""}"><img src="${img}" alt=""></div>`).join("")}</div>` : ""}
          </div>
          <div class="product-info">
            <div class="product-meta">${badges.join("")}<span class="badge" style="background:var(--bg-elevated);color:var(--text-muted)">${product.categoryName || ""}</span></div>
            <h1>${product.name}</h1>
            <p class="price">${UI.formatPrice(product.price)}</p>
            <p class="stock ${stockClass}">${stockText}</p>
            <p class="description">${product.description || ""}</p>
            <div class="product-actions">
              ${product.stock > 0 ? Components.telegramButton(product) : `<button class="btn btn-secondary" disabled>${I18N.t("soldOut")}</button>`}
              ${product.videoLink ? `<a href="${product.videoLink}" target="_blank" rel="noopener" class="btn btn-secondary btn-video">${I18N.t("watchVideo")}</a>` : ""}
              <button class="btn btn-secondary" id="shareBtn">${I18N.t("share")}</button>
            </div>
          </div>
        </div>`;

      ImageSlider.init(document.getElementById("imageSlider"));
      document.getElementById("shareBtn")?.addEventListener("click", () => UI.shareProduct(product));

      const related = await FirebaseService.getRelatedProducts(product);
      if (related.length) {
        document.getElementById("relatedSection").style.display = "block";
        Products.renderGrid(related, document.getElementById("relatedGrid"));
      }
    });
  </script>
</body>
</html>

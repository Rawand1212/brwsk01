<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — brwsk01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=12">
</head>
<body>
  <div id="site-header"></div>

  <main class="search-page">
    <div class="container">
      <div class="search-hero">
        <h1 id="searchTitle" style="text-align:center;margin-bottom:1.5rem"></h1>
        <div class="search-wrapper">
          <input type="search" class="search-input" id="searchInput" autofocus>
          <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
      </div>
      <div id="searchResults">
        <div class="product-grid" id="productGrid"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=12"></script>
  <script src="assets/js/i18n.js?v=12"></script>
  <script src="assets/js/demo-data.js?v=12"></script>
  <script src="firebase/config.js?v=12"></script>
  <script src="assets/js/image-utils.js?v=12"></script>
  <script src="assets/js/ui.js?v=12"></script>
  <script src="assets/js/firebase-service.js?v=12"></script>
  <script src="assets/js/products.js?v=12"></script>
  <script src="assets/js/components.js?v=12"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("search");
      document.getElementById("searchTitle").textContent = I18N.t("search");
      document.getElementById("searchInput").placeholder = I18N.t("searchPlaceholder");

      const input = document.getElementById("searchInput");
      const suggestions = document.getElementById("searchSuggestions");
      const grid = document.getElementById("productGrid");

      Search.init(input, suggestions);

      const query = new URLSearchParams(window.location.search).get("q");
      if (query) {
        input.value = query;
        UI.showLoader(grid);
        const products = await FirebaseService.getProducts({ search: query });
        Products.renderGrid(products, grid);
      }
    });
  </script>
</body>
</html>

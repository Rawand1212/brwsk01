<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — brwsk01</title>
  <link rel="stylesheet" href="assets/css/main.css?v=12">
</head>
<body>
  <div id="site-header"></div>

  <main class="section">
    <div class="container">
      <div class="section-header">
        <h1 id="pageTitle"></h1>
        <p id="pageSubtitle"></p>
      </div>
      <div class="category-pills" id="categoryPills"></div>
      <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/config.js?v=12"></script>
  <script src="assets/js/i18n.js?v=12"></script>
  <script src="assets/js/demo-data.js?v=12"></script>
  <script src="firebase/config.js?v=12"></script>
  <script src="assets/js/image-utils.js?v=12"></script>
  <script src="assets/js/ui.js?v=12"></script>
  <script src="assets/js/firebase-service.js?v=12"></script>
  <script src="assets/js/products.js?v=12"></script>
  <script src="assets/js/components.js?v=12"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      I18N.apply();
      Components.injectLayout("products");

      const params = new URLSearchParams(window.location.search);
      const categoryId = params.get("category");
      const filter = params.get("filter");

      const categories = await FirebaseService.getCategories();
      Products.renderCategoryPills(categories, document.getElementById("categoryPills"), categoryId);

      document.getElementById("pageTitle").textContent = I18N.t("allProducts");
      document.getElementById("pageSubtitle").textContent = I18N.t("allProductsSub");

      if (filter === "featured") {
        document.getElementById("pageTitle").textContent = I18N.t("featured");
      } else if (filter === "new") {
        document.getElementById("pageTitle").textContent = I18N.t("newArrivals");
      } else if (categoryId) {
        const cat = categories.find((c) => c.id === categoryId);
        if (cat) document.getElementById("pageTitle").textContent = cat.name;
      }

      UI.showLoader(document.getElementById("productGrid"));

      const filters = {};
      if (categoryId) filters.categoryId = categoryId;
      if (filter === "featured") filters.featured = true;
      if (filter === "new") filters.isNew = true;

      const products = await FirebaseService.getProducts(filters);
      Products.renderGrid(products, document.getElementById("productGrid"));
    });
  </script>
</body>
</html>
